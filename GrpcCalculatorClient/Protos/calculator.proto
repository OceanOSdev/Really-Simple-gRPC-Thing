syntax = "proto3";

option csharp_namespace = "GrpcCalculatorClient";

package calculator;

// The calculator service definition.
service Calculator {
  // Adds numbers
  rpc Add (AddRequest) returns (AddReply);
}

message AddRequest {
  int32 lhs = 1;
  int32 rhs = 2;
}

message AddReply {
  int32 sum = 1;
}
